<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Next Step | Zen Tacticians</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EDE8DE;
    --bg-glow: radial-gradient(120% 140% at 50% -10%, #F4EFE4 0%, #EDE8DE 55%, #E6E0D2 100%);
    --ink: #262E2A;
    --ink-soft: #5B655F;
    --sage: #6E8267;
    --sage-dim: #B9C4B1;
    --indigo: #5B6478;
    --gold: #C9A24A;
    --gold-glow: #E7C97A;
    --card: #F7F4EC;
    --card-hover: #FBF9F3;
    --line: #D8D2C4;
    --shadow: rgba(38, 46, 42, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-glow);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .app {
    width: 100%;
    max-width: 560px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage);
    text-align: center;
    margin: 0 0 6px;
  }

  .wordmark {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    margin: 0 0 32px;
  }

  /* --- The path: lantern-lit stepping stones --- */
  .path {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 36px;
  }
  .stone {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--sage-dim);
    border: 1px solid var(--line);
    position: relative;
    transition: background 0.5s ease, box-shadow 0.6s ease, border-color 0.5s ease;
    flex-shrink: 0;
  }
  .stone.lit {
    background: var(--gold-glow);
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(201,162,74,0.18), 0 0 14px 2px rgba(231,201,122,0.55);
  }
  .stone.current {
    box-shadow: 0 0 0 5px rgba(201,162,74,0.22), 0 0 18px 3px rgba(231,201,122,0.7);
  }
  @media (prefers-reduced-motion: no-preference) {
    .stone.current { animation: flicker 2.4s ease-in-out infinite; }
  }
  @keyframes flicker {
    0%, 100% { box-shadow: 0 0 0 5px rgba(201,162,74,0.22), 0 0 18px 3px rgba(231,201,122,0.7); }
    50% { box-shadow: 0 0 0 6px rgba(201,162,74,0.28), 0 0 22px 5px rgba(231,201,122,0.85); }
  }
  .stone-track {
    width: 44px;
    height: 1px;
    background: var(--line);
    position: relative;
    flex-shrink: 0;
  }
  .stone-track.lit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.6s ease;
  }
  .stone-track.lit.fill::after { transform: scaleX(1); }

  /* --- Card --- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 40px 36px;
    box-shadow: 0 12px 32px var(--shadow);
  }
  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
  }

  .step-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  h1.question {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1.25;
    margin: 0 0 8px;
  }

  .sub {
    color: var(--ink-soft);
    font-size: 15px;
    margin: 0 0 28px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    text-align: left;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 15.5px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .option:hover {
    border-color: var(--sage);
    background: var(--card-hover);
    transform: translateY(-1px);
  }
  .option:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .back-row {
    margin-top: 24px;
    min-height: 20px;
  }
  .back-link {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    padding: 4px 0;
  }
  .back-link:hover { color: var(--ink); }

  /* --- Result screen --- */
  .result { text-align: center; }
  .lantern {
    margin: 0 auto 20px;
    width: 44px;
    height: 44px;
  }
  .result h1.question { font-size: 26px; }
  .result .sub { margin-bottom: 4px; }
  .result-body {
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 18px 0 30px;
    text-align: left;
  }
  .result-body strong { color: var(--ink); font-weight: 600; }

  .cta {
    display: inline-block;
    width: 100%;
    background: var(--sage);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 15.5px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .cta:hover { background: #5d715a; transform: translateY(-1px); }
  .cta:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .restart {
    display: block;
    margin: 18px auto 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="app">
  <p class="eyebrow">Guided Clarity</p>
  <p class="wordmark">zen tacticians</p>

  <div class="path" id="path"></div>

  <div class="card" id="card"></div>
</div>

<script>
  const questions = [
    {
      id: 'state',
      prompt: "Where are you today?",
      sub: "Choose what feels most true right now.",
      options: [
        { label: "I feel stuck", value: "stuck" },
        { label: "I'm overthinking a decision", value: "overthinking" },
        { label: "Technology has me overwhelmed", value: "tech" },
        { label: "I'm navigating a big change", value: "change" },
      ]
    },
    {
      id: 'domain',
      prompt: "What's most on your mind?",
      sub: "Pick the area that's asking for attention.",
      options: [
        { label: "Life & personal decisions", value: "life" },
        { label: "Career & work", value: "career" },
        { label: "Running my business", value: "business" },
        { label: "Tools, systems & technology", value: "systech" },
      ]
    },
    {
      id: 'need',
      prompt: "What would help most right now?",
      sub: "There's no wrong answer.",
      options: [
        { label: "Someone to think it through with", value: "talk" },
        { label: "A plan and clear next steps", value: "plan" },
        { label: "To feel less overwhelmed", value: "calm" },
        { label: "Clarity on a decision", value: "clarity" },
      ]
    }
  ];

  const openers = {
    stuck: "Feeling stuck is usually a sign you're between one version of things and the next — not a sign you're doing it wrong.",
    overthinking: "When a decision loops in your head, more thinking rarely produces more clarity.",
    tech: "Technology is supposed to make life simpler. When it doesn't, that's not a \"you\" problem.",
    change: "Change asks a lot of us, even good change. It makes sense you want solid ground."
  };

  const domainLabels = {
    life: "life & personal decisions",
    career: "career & work",
    business: "running your business",
    systech: "your tools & technology"
  };

  const domainBody = {
    life: "Your next step starts with sorting what's actually yours to carry, and what isn't.",
    career: "Your next step starts with naming what \"good\" looks like for you right now, not for anyone else.",
    business: "Your next step starts with picking the one thing worth simplifying first.",
    systech: "Your next step starts with a plain-language look at what's actually broken. No jargon required."
  };

  const needClose = {
    talk: "A Guided Clarity session gives you a real conversation, not another to-do list.",
    plan: "A Guided Clarity session turns the noise into two or three next steps you can actually follow.",
    calm: "A Guided Clarity session slows things down long enough for the fog to lift.",
    clarity: "A Guided Clarity session helps you see the decision clearly enough to make it."
  };

  const BOOKING_URL = "https://zentacticians.com/#page-1";

  let step = 0; // 0,1,2 = questions; 3 = result
  const answers = {};

  const pathEl = document.getElementById('path');
  const cardEl = document.getElementById('card');

  function renderPath() {
    pathEl.innerHTML = '';
    const totalStones = questions.length + 1;
    for (let i = 0; i < totalStones; i++) {
      const stone = document.createElement('div');
      stone.className = 'stone';
      if (i < step) stone.classList.add('lit');
      if (i === step) stone.classList.add('lit', 'current');
      pathEl.appendChild(stone);

      if (i < totalStones - 1) {
        const track = document.createElement('div');
        track.className = 'stone-track';
        if (i < step) track.classList.add('lit', 'fill');
        pathEl.appendChild(track);
      }
    }
  }

  function renderQuestion() {
    const q = questions[step];
    cardEl.innerHTML = '';

    const stepLabel = document.createElement('p');
    stepLabel.className = 'step-label';
    stepLabel.textContent = `Step ${step + 1} of ${questions.length}`;
    cardEl.appendChild(stepLabel);

    const h1 = document.createElement('h1');
    h1.className = 'question';
    h1.textContent = q.prompt;
    cardEl.appendChild(h1);

    const sub = document.createElement('p');
    sub.className = 'sub';
    sub.textContent = q.sub;
    cardEl.appendChild(sub);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        answers[q.id] = opt.value;
        step++;
        render();
      });
      opts.appendChild(btn);
    });
    cardEl.appendChild(opts);

    const backRow = document.createElement('div');
    backRow.className = 'back-row';
    if (step > 0) {
      const back = document.createElement('button');
      back.className = 'back-link';
      back.textContent = '← Back';
      back.addEventListener('click', () => { step--; render(); });
      backRow.appendChild(back);
    }
    cardEl.appendChild(backRow);
  }

  function renderResult() {
    cardEl.innerHTML = '';
    cardEl.classList.add('result');

    const lantern = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    lantern.setAttribute('class', 'lantern');
    lantern.setAttribute('viewBox', '0 0 48 48');
    lantern.innerHTML = `
      <circle cx="24" cy="24" r="14" fill="var(--gold-glow)" opacity="0.35"/>
      <rect x="17" y="14" width="14" height="18" rx="3" fill="none" stroke="var(--gold)" stroke-width="1.6"/>
      <line x1="24" y1="8" x2="24" y2="14" stroke="var(--gold)" stroke-width="1.6"/>
      <line x1="24" y1="32" x2="24" y2="38" stroke="var(--gold)" stroke-width="1.6"/>
      <circle cx="24" cy="23" r="4" fill="var(--gold)"/>
    `;
    cardEl.appendChild(lantern);

    const stepLabel = document.createElement('p');
    stepLabel.className = 'step-label';
    stepLabel.style.textAlign = 'center';
    stepLabel.textContent = 'Your Next Step';
    cardEl.appendChild(stepLabel);

    const h1 = document.createElement('h1');
    h1.className = 'question';
    h1.textContent = `On ${domainLabels[answers.domain]}`;
    cardEl.appendChild(h1);

    const body = document.createElement('div');
    body.className = 'result-body';
    body.innerHTML = `
      <p>${openers[answers.state]}</p>
      <p>${domainBody[answers.domain]}</p>
      <p><strong>${needClose[answers.need]}</strong></p>
    `;
    cardEl.appendChild(body);

    const cta = document.createElement('a');
    cta.className = 'cta';
    cta.href = BOOKING_URL;
    cta.target = '_blank';
    cta.rel = 'noopener';
    cta.textContent = 'Book a Guided Clarity Session ➔';
    cardEl.appendChild(cta);

    const restart = document.createElement('button');
    restart.className = 'restart';
    restart.textContent = 'Start over';
    restart.addEventListener('click', () => {
      step = 0;
      answers.state = answers.domain = answers.need = undefined;
      cardEl.classList.remove('result');
      render();
    });
    cardEl.appendChild(restart);
  }

  function render() {
    renderPath();
    if (step < questions.length) {
      cardEl.classList.remove('result');
      renderQuestion();
    } else {
      renderResult();
    }
  }

  render();
</script>

</body>
</html>
